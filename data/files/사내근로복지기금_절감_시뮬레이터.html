// ── 설정 (요율) ──
const R = {
  npE:.0475, npC:.0475, hiE:.03595, hiC:.03595, lcE:.004724, lcC:.004724,
  eiE:.009, eiC:.009, esC:.0025, iaC:.008,
  npFloor:400000, npCeil:6370000, mealLim:200000, localRate:0.1
};

function lookupTax(income, dep) {
  const col = Math.min(Math.max(dep,1),11);
  let tax = 0;
  for (let i=0; i<TAX_TABLE.length; i++) {
    if (TAX_TABLE[i][0] <= income) tax = TAX_TABLE[i][col]; else break;
  }
  return tax;
}

function calc(inp, dep) {
  const {basePay,taxableAllow,overtime,bonus,mealAllow,taxFreeOther} = inp;
  const gross = basePay+taxableAllow+overtime+bonus+mealAllow+taxFreeOther;
  const taxable = basePay+taxableAllow+overtime+bonus;
  if(gross===0) return {grossPay:0,taxableIncome:0,npE:0,npC:0,hiE:0,hiC:0,lcE:0,lcC:0,eiE:0,eiC:0,esC:0,iaC:0,incomeTax:0,localTax:0,totalDeduct:0,netPay:0,companyBurden:0,totalCost:0};
  const pb = Math.min(Math.max(taxable,R.npFloor),R.npCeil);
  const npE=Math.round(pb*R.npE), npC=Math.round(pb*R.npC);
  const hiE=Math.round(taxable*R.hiE), hiC=Math.round(taxable*R.hiC);
  const lcE=Math.round(taxable*R.lcE), lcC=Math.round(taxable*R.lcC);
  const eiE=Math.round(taxable*R.eiE), eiC=Math.round(taxable*R.eiC);
  const esC=Math.round(taxable*R.esC), iaC=Math.round(taxable*R.iaC);
  const it=lookupTax(taxable,dep), lt=Math.round(it*R.localRate);
  const td=npE+hiE+lcE+eiE+it+lt;
  const net=gross-td;
  const cb=npC+hiC+lcC+eiC+esC+iaC;
  return {grossPay:gross,taxableIncome:taxable,npE,npC,hiE,hiC,lcE,lcC,eiE,eiC,esC,iaC,incomeTax:it,localTax:lt,totalDeduct:td,netPay:net,companyBurden:cb,totalCost:gross+cb};
}

  const aResult = calc(emp.a, emp.dep);
  const targetNet = aResult.netPay;
  if(targetNet <= 0) return {basePay:0, bInput:{basePay:0,taxableAllow:0,overtime:0,bonus:0,mealAllow:0,taxFreeOther:0}, result: calc({basePay:0,taxableAllow:0,overtime:0,bonus:0,mealAllow:0,taxFreeOther:0}, emp.dep)};

  const wf = emp.welfareFund || 0;
  if(wf <= 0) return {basePay: emp.a.basePay, bInput: {...emp.a}, result: calc(emp.a, emp.dep)};

  function buildB(bp) {
    return { basePay:bp, taxableAllow:emp.a.taxableAllow, overtime:emp.a.overtime, bonus:emp.a.bonus, mealAllow:emp.a.mealAllow, taxFreeOther:wf };
  }

  let lo = 0, hi = emp.a.basePay + wf;
  for(let i=0; i<50; i++) {
    const mid = Math.round((lo+hi)/2);
    const r = calc(buildB(mid), emp.dep);
    if(r.netPay < targetNet) lo = mid;
    else if(r.netPay > targetNet) hi = mid;
    else { lo = hi = mid; break; }
    if(hi - lo <= 1) break;
  }
  const rLo = calc(buildB(lo), emp.dep);
  const rHi = calc(buildB(hi), emp.dep);
  if(Math.abs(rHi.netPay - targetNet) <= Math.abs(rLo.netPay - targetNet)) {
    return {basePay:hi, bInput:buildB(hi), result:rHi};
  }
  return {basePay:lo, bInput:buildB(lo), result:rLo};
}

// ── State ──

  {id:"E001",name:"홍길동",dept:"영업",rank:"대리",dep:2,
    a:{basePay:0,taxableAllow:0,overtime:0,bonus:0,mealAllow:0,taxFreeOther:0},
    welfareFund:0},
  {id:"E002",name:"김영희",dept:"경영지원",rank:"사원",dep:1,

    welfareFund:0},

  {k:'npC',l:'국민연금(회사)',s:'dc'},{k:'hiC',l:'건강보험(회사)',s:'dc'},{k:'lcC',l:'장기요양(회사)',s:'dc'},{k:'eiC',l:'고용보험(회사)',s:'dc'},
  {k:'esC',l:'고용안정/직능(회사)',s:'dc'},{k:'iaC',l:'산재보험(회사)',s:'dc'},

  {k:'totalCost',l:'회사총비용',s:'tot'}
];

const SC = {
  pay:'#bbf7d0', de:'#fde68a', det:'#fde047', net:'#93c5fd',
  dc:'#f9a8d4', dct:'#f472b6', tot:'#c4b5fd'
};
const isTotal = s => ['det','dct','tot','net'].includes(s);

function getResults() {
  return employees.map(e=>{
    const a = calc(e.a, e.dep);
    const solved = solveBasePayB(e);
    return {a, b: solved.result, bInput: solved.bInput, bBasePay: solved.basePay};
  });
}

// ── Render Functions ──
function renderSummaryCards() {
  const res = getResults();
  let totalCostA=0, totalCostB=0;
  res.forEach(r=>{ totalCostA+=r.a.totalCost; totalCostB+=r.b.totalCost; });
  const coSave = totalCostA - totalCostB;
  const pct = totalCostA>0 ? (coSave/totalCostA*100).toFixed(2) : '0.00';
  const items = [
    {label:'A 회사 총 인건비',value:totalCostA,color:'#94a3b8',isMoney:true,sign:false},
    {label:'B 회사 총 인건비',value:totalCostB,color:'#c4b5fd',isMoney:true,sign:false},
    {label:'회사 비용 절감액 (A-B)',value:coSave,color:'#34d399',isMoney:true,sign:true},
    {label:'인건비 대비 절감률',value:pct,color:'#fbbf24',isMoney:false}
  ];
  document.getElementById('summaryCards').innerHTML = items.map(c=>
    `<div class="summary-card"><div class="label">${c.label}</div><div class="value" style="color:${c.color}">${c.isMoney?(c.sign&&c.value>=0?'+':'')+fmt(c.value)+'<span class="unit"> 원/월</span>':c.value+'<span class="unit"> %</span>'}</div></div>`
  ).join('');
}

  ROWS.forEach(row=>{

      h += `<td class="cell-right bl-light" style="font-weight:${tot?600:400}">${fmt(a)}</td>`;

    });
    h += '</tr>';
  });
  h += '</table></div>';
  h += '<p class="note">※ 차이가 음수(녹색)이면 B시나리오에서 절감되는 금액입니다.</p>';
  document.getElementById('tab-summary').innerHTML = h;
}

  h += '</div>';
  // input grid
  h += '<div class="input-grid">';

  // ── A: 일반 급여 (전체 입력) ──
  h += '<div class="scenario-box a"><div class="scenario-title a">A. 일반 급여</div>';
  FIELDS_A.forEach(f=>{

  h += '</div>';

  // ── B: 복지기금 전환 (복지기금 금액만 입력, 나머지 자동) ──

  h += '<div style="background:rgba(168,85,247,0.1);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#c4b5fd;line-height:1.5">';
  h += '💡 복지기금 금액만 입력하면, A와 <b>동일한 실수령액</b>이 되도록 기본급이 자동 역산됩니다.</div>';

  // 복지기금 입력
  h += '<div class="field-group"><label class="field-label" style="color:#c084fc;font-weight:700;font-size:12px">사내근로복지기금 (비과세)</label>';
  h += `<input class="field-input" data-sc="b" data-key="welfareFund" type="text" inputmode="numeric" value="${emp.welfareFund===0?'':fmt(emp.welfareFund)}" `;
  h += `oninput="updateWelfare(${activeEmpIdx},this)" style="border-color:#a78bfa;background:#faf5ff" `;
  h += `onfocus="this.style.borderColor='#7c3aed'" onblur="this.style.borderColor='#a78bfa'"></div>`;

  // 자동 계산된 항목 표시

    {label:'기본급 (자동계산)', value:bi.basePay, highlight:true},
    {label:'과세수당', value:bi.taxableAllow},
    {label:'연장/야간/휴일', value:bi.overtime},
    {label:'상여금', value:bi.bonus},

    h += `<div class="field-group"><label class="field-label">${f.label}</label>`;

  // A기본급 대비 절감 표시

function renderDetailTab() {

  let h = '<div class="card">';
  h += '<div class="emp-btns">';

function render() {
  renderSummaryCards();
  renderSummaryTab();
  renderInputTab();
  renderDetailTab();
}

function updateFieldA(empIdx, key, el) {
  const raw = el.value.replace(/[^0-9]/g,'');
  const v = raw===''?0:parseInt(raw,10);
  employees[empIdx].a[key] = v;
  const pos = el.selectionStart;
  const oldLen = el.value.length;
  render();
  const inputTab = document.getElementById('tab-input');
  const inputs = inputTab.querySelectorAll('input[data-sc="a"]');
  const fIdx = FIELDS_A.findIndex(f=>f.key===key);
  if(inputs[fIdx]) {
    inputs[fIdx].focus();
    const newLen = inputs[fIdx].value.length;
    const newPos = pos + (newLen - oldLen);
    inputs[fIdx].setSelectionRange(newPos, newPos);
  }
}

function updateWelfare(empIdx, el) {
  const raw = el.value.replace(/[^0-9]/g,'');
  const v = raw===''?0:parseInt(raw,10);
  employees[empIdx].welfareFund = v;
  const pos = el.selectionStart;
  const oldLen = el.value.length;
  render();
  const inputTab = document.getElementById('tab-input');
  const wInput = inputTab.querySelector('input[data-key="welfareFund"]');
  if(wInput) {
    wInput.focus();
    const newLen = wInput.value.length;
    const newPos = pos + (newLen - oldLen);
    wInput.setSelectionRange(newPos, newPos);
  }
}

function resetEmp(idx) {
  employees[idx].a = {basePay:0,taxableAllow:0,overtime:0,bonus:0,mealAllow:0,taxFreeOther:0};
  employees[idx].welfareFund = 0;
  render();
}

function resetAll() {
  employees.forEach((_,i) => resetEmp(i));
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+activeTab).classList.add('active');
  });
});

// Initial render
render();
</script>
